<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0C0C0C;color:#F0F0F0;font-family:'Inter',sans-serif;min-height:100vh;padding:20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.logo{font-size:22px;font-weight:700;letter-spacing:-0.03em}
.logo span{color:#F0B429}
.month{font-size:11px;color:#555;background:#141414;border:1px solid #1E1E1E;border-radius:6px;padding:4px 12px;font-family:'JetBrains Mono',monospace}
.refresh-btn{background:none;border:1px solid #222;border-radius:6px;color:#555;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'Inter',sans-serif}
.refresh-btn:hover{border-color:#F0B429;color:#F0B429}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:#111;border:1px solid #1A1A1A;border-radius:10px;padding:14px;position:relative;overflow:hidden}
.card-line{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.card-lbl{font-size:9px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.card-amt{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px}
.card-sub{font-size:10px;color:#444}
.viz-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:700px){.viz-grid{grid-template-columns:1fr}}
.panel{background:#111;border:1px solid #1A1A1A;border-radius:10px;padding:16px}
.panel-title{font-size:9px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;display:flex;justify-content:space-between}
.panel-title em{color:#F0B429;font-style:normal}
.chart-wrap{position:relative}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-total{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#F0B429}
.donut-lbl{font-size:9px;color:#555;margin-top:2px}
.legend{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.leg-row{display:flex;align-items:center;gap:7px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:10px;color:#888;flex:1}
.leg-amt{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#F0F0F0}
.rec-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #161616}
.rec-row:last-child{border:none}
.rec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rec-info{flex:1;min-width:0}
.rec-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-date{font-size:9px;color:#444;margin-top:1px}
.rec-amt{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#F0B429;flex-shrink:0}
.wvw-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.wvw-name{font-size:10px;width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wvw-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.wvw-track{height:4px;background:#1A1A1A;border-radius:2px;overflow:hidden}
.wvw-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.wvw-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;width:48px;flex-shrink:0}
.wvw-this{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.wvw-chg{font-size:9px}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.bottom-row{grid-template-columns:1fr}}
.empty{text-align:center;padding:40px;color:#333;font-size:13px}
.loading{text-align:center;padding:60px;color:#555;font-size:14px}
.error-msg{background:#1A0A0A;border:1px solid #3A1A1A;border-radius:10px;padding:16px;color:#FF6B6B;font-size:13px;margin-bottom:14px;display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Expense<span>.</span></div>
  <div id="month-badge" class="month">Loading...</div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<div id="error-box" class="error-msg"></div>
<div id="loading" class="loading">Loading your expenses...</div>
<div id="main" style="display:none">

  <div class="cards">
    <div class="card"><div class="card-line" style="background:#51CF66"></div><div class="card-lbl">Today</div><div class="card-amt" id="c-today" style="color:#51CF66">$0</div><div class="card-sub" id="c-today-sub"></div></div>
    <div class="card"><div class="card-line" style="background:#F0B429"></div><div class="card-lbl">This Week</div><div class="card-amt" id="c-week" style="color:#F0B429">$0</div><div class="card-sub" id="c-week-sub"></div></div>
    <div class="card"><div class="card-line" style="background:#333"></div><div class="card-lbl">Last Week</div><div class="card-amt" id="c-lweek" style="color:#444">$0</div><div class="card-sub"></div></div>
    <div class="card"><div class="card-line" style="background:#339AF0"></div><div class="card-lbl">This Month</div><div class="card-amt" id="c-month" style="color:#fff">$0</div><div class="card-sub" id="c-month-sub"></div></div>
  </div>

  <div class="viz-grid">
    <div class="panel">
      <div class="panel-title">By category <em>this month</em></div>
      <div class="chart-wrap">
        <canvas id="donut" height="160"></canvas>
        <div class="donut-center"><div class="donut-total" id="donut-total">$0</div><div class="donut-lbl">this month</div></div>
      </div>
      <div class="legend" id="donut-legend"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Daily spend <em>this week</em></div>
      <canvas id="daily" height="160"></canvas>
      <div style="margin-top:14px;border-top:1px solid #1A1A1A;padding-top:14px">
        <div class="panel-title" style="margin-bottom:10px">30-day trend</div>
        <canvas id="trend" height="70"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Recent transactions</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="panel">
      <div class="panel-title">Week vs week <em>by category</em></div>
      <div id="wvw-list"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Month summary</div>
      <div id="month-summary"></div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ── Replace with your values ──────────────────────
var GITHUB_USER  = "YOUR_GITHUB_USERNAME";
var GITHUB_REPO  = "expenses";
var GITHUB_FILE  = "expenses.json";
// ─────────────────────────────────────────────────────────────

var CAT_COLORS = {
  "Food & Dining":"#FF6B6B","Groceries":"#51CF66","Transport":"#339AF0",
  "Shopping":"#F59F00","Entertainment":"#CC5DE8","Health":"#FF8787",
  "Bills":"#748FFC","Other":"#868E96"
};
var CAT_ICONS = {
  "Food & Dining":"🍽️","Groceries":"🛒","Transport":"🚗","Shopping":"🛍️",
  "Entertainment":"🎬","Health":"💊","Bills":"⚡","Other":"📦"
};

var donutChart=null, dailyChart=null, trendChart=null;

function fmt(n){ return "$"+n.toFixed(2); }
function todayStr(){ return new Date().toISOString().split("T")[0]; }

function getWeekStart(offset){
  var d=new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()+offset*7);
  return d;
}

async function loadData(){
  document.getElementById("loading").style.display="block";
  document.getElementById("main").style.display="none";
  document.getElementById("error-box").style.display="none";
  try {
    var url = "https://raw.githubusercontent.com/"+GITHUB_USER+"/"+GITHUB_REPO+"/main/"+GITHUB_FILE+"?t="+Date.now();
    var res = await fetch(url);
    if(!res.ok) throw new Error("Could not load expenses.json — make sure your repo is public and the file exists.");
    var expenses = await res.json();
    render(expenses);
    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="block";
  } catch(e){
    document.getElementById("loading").style.display="none";
    var eb=document.getElementById("error-box");
    eb.textContent="⚠ "+e.message;
    eb.style.display="block";
  }
}

function render(expenses){
  var now = new Date();
  var today = todayStr();
  var wkStart  = getWeekStart(0);
  var lwkStart = getWeekStart(-1);
  var mStart   = new Date(now.getFullYear(), now.getMonth(), 1);

  document.getElementById("month-badge").textContent =
    now.toLocaleDateString("en-US",{month:"long",year:"numeric"}).toUpperCase();

  var todayExps = expenses.filter(e=>e.date===today);
  var twExps    = expenses.filter(e=>new Date(e.date+"T12:00:00")>=wkStart);
  var lwExps    = expenses.filter(e=>{ var d=new Date(e.date+"T12:00:00"); return d>=lwkStart&&d<wkStart; });
  var mExps     = expenses.filter(e=>new Date(e.date+"T12:00:00")>=mStart);

  var sum = arr=>arr.reduce((t,e)=>t+parseFloat(e.amount||0),0);
  var tT=sum(todayExps), wT=sum(twExps), lwT=sum(lwExps), mT=sum(mExps);
  var wChg = lwT>0 ? ((wT-lwT)/lwT*100) : null;

  // CARDS
  document.getElementById("c-today").textContent  = fmt(tT);
  document.getElementById("c-today-sub").textContent = todayExps.length+" transactions";
  document.getElementById("c-week").textContent   = fmt(wT);
  document.getElementById("c-week-sub").textContent  = wChg!==null?(wChg>=0?"▲":"▼")+Math.abs(wChg).toFixed(1)+"% vs last week":"";
  document.getElementById("c-week-sub").style.color  = wChg===null?"#444":(wChg>0?"#FF6B6B":"#51CF66");
  document.getElementById("c-lweek").textContent  = fmt(lwT);
  document.getElementById("c-month").textContent  = fmt(mT);
  document.getElementById("c-month-sub").textContent = mExps.length+" transactions";

  // DONUT
  var catTotals={};
  mExps.forEach(e=>{ var c=e.category||"Other"; catTotals[c]=(catTotals[c]||0)+parseFloat(e.amount||0); });
  var sortedCats=Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  var donutColors=sortedCats.map(([c])=>CAT_COLORS[c]||"#868E96");

  document.getElementById("donut-total").textContent=fmt(mT);
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(document.getElementById("donut"),{
    type:"doughnut",
    data:{ labels:sortedCats.map(([c])=>c), datasets:[{data:sortedCats.map(([,v])=>v), backgroundColor:donutColors, borderWidth:2, borderColor:"#111", hoverBorderColor:"#111"}] },
    options:{ cutout:"58%", plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+": "+fmt(ctx.raw)}}}, animation:{duration:600} }
  });

  var legend=document.getElementById("donut-legend");
  legend.innerHTML="";
  sortedCats.slice(0,6).forEach(([cat,amt])=>{
    legend.innerHTML+=`<div class="leg-row"><div class="leg-dot" style="background:${CAT_COLORS[cat]||"#868E96"}"></div><div class="leg-name">${cat}</div><div class="leg-amt">${fmt(amt)}</div></div>`;
  });

  // DAILY BARS
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var dailyAmts=Array(7).fill(0);
  twExps.forEach(e=>{ var d=new Date(e.date+"T12:00:00"); dailyAmts[d.getDay()]+=parseFloat(e.amount||0); });
  var todayDay=new Date().getDay();
  var barColors=dailyAmts.map((_,i)=>i===todayDay?"#F0B429":"#2A2A2A");

  if(dailyChart) dailyChart.destroy();
  dailyChart=new Chart(document.getElementById("daily"),{
    type:"bar",
    data:{ labels:days, datasets:[{data:dailyAmts, backgroundColor:barColors, borderRadius:4, borderSkipped:false}] },
    options:{ plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
      scales:{ x:{ticks:{color:"#555",font:{size:10}},grid:{display:false},border:{color:"#1A1A1A"}},
               y:{ticks:{color:"#555",font:{size:9},callback:v=>"$"+v},grid:{color:"#1A1A1A"},border:{color:"#1A1A1A"},beginAtZero:true} },
      animation:{duration:600} }
  });

  // 30-DAY TREND
  var trendLabels=[], trendData=[];
  for(var ti=29;ti>=0;ti--){
    var td=new Date(); td.setDate(td.getDate()-ti);
    var tStr=td.toISOString().split("T")[0];
    var tAmt=expenses.filter(e=>e.date===tStr).reduce((s,e)=>s+parseFloat(e.amount||0),0);
    trendLabels.push(ti===0?"Today":ti===1?"Yest":td.toLocaleDateString("en-US",{month:"short",day:"numeric"}));
    trendData.push(tAmt);
  }
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(document.getElementById("trend"),{
    type:"line",
    data:{ labels:trendLabels, datasets:[{data:trendData, borderColor:"#F0B429", borderWidth:1.5,
      fill:true, backgroundColor:ctx=>{ var g=ctx.chart.ctx.createLinearGradient(0,0,0,60);
        g.addColorStop(0,"rgba(240,180,41,0.25)"); g.addColorStop(1,"rgba(240,180,41,0)"); return g; },
      pointRadius:0, tension:0.4}] },
    options:{ plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
      scales:{ x:{ticks:{color:"#444",font:{size:8},maxTicksLimit:5,maxRotation:0},grid:{display:false},border:{color:"transparent"}},
               y:{ticks:{color:"#444",font:{size:8},callback:v=>"$"+v},grid:{color:"#1A1A1A"},border:{color:"transparent"},beginAtZero:true} },
      animation:{duration:600} }
  });

  // RECENT
  var recHtml="";
  var recent=[...expenses].reverse().slice(0,8);
  if(recent.length===0) recHtml=`<div class="empty">No transactions yet</div>`;
  recent.forEach(e=>{
    var c=e.category||"Other";
    var cc=CAT_COLORS[c]||"#868E96";
    var icon=CAT_ICONS[c]||"📦";
    var dateDisp=e.date===today?"Today":new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
    recHtml+=`<div class="rec-row">
      <div class="rec-icon" style="background:${cc}22">${icon}</div>
      <div class="rec-info"><div class="rec-name">${e.notes||c}</div><div class="rec-date">${dateDisp} · ${c}</div></div>
      <div class="rec-amt">${fmt(parseFloat(e.amount||0))}</div>
    </div>`;
  });
  document.getElementById("recent-list").innerHTML=recHtml;

  // WEEK VS WEEK
  var twCats={},lwCats={};
  twExps.forEach(e=>{ var c=e.category||"Other"; twCats[c]=(twCats[c]||0)+parseFloat(e.amount||0); });
  lwExps.forEach(e=>{ var c=e.category||"Other"; lwCats[c]=(lwCats[c]||0)+parseFloat(e.amount||0); });
  var allCats=[...new Set([...Object.keys(twCats),...Object.keys(lwCats)])];
  var maxWvw=Math.max(...allCats.map(c=>Math.max(twCats[c]||0,lwCats[c]||0)),1);
  var wvwHtml="";
  if(allCats.length===0) wvwHtml=`<div class="empty">No data yet</div>`;
  allCats.sort((a,b)=>(twCats[b]||0)-(twCats[a]||0)).forEach(cat=>{
    var tw2=twCats[cat]||0, lw2=lwCats[cat]||0;
    var chg=lw2>0?((tw2-lw2)/lw2*100):null;
    var cc=CAT_COLORS[cat]||"#868E96";
    var chgTxt=chg===null?"new":(chg>=0?"▲":"▼")+Math.abs(chg).toFixed(1)+"%";
    var chgColor=chg===null?"#555":(chg>0?"#FF6B6B":"#51CF66");
    wvwHtml+=`<div class="wvw-row">
      <div class="wvw-name" style="color:${cc}">${CAT_ICONS[cat]||"•"} ${cat.split(" ")[0]}</div>
      <div class="wvw-bars">
        <div class="wvw-track"><div class="wvw-fill" style="width:${(tw2/maxWvw)*100}%;background:${cc}"></div></div>
        <div class="wvw-track"><div class="wvw-fill" style="width:${(lw2/maxWvw)*100}%;background:${cc}44"></div></div>
      </div>
      <div class="wvw-right">
        <div class="wvw-this" style="color:${cc}">${fmt(tw2)}</div>
        <div class="wvw-chg" style="color:${chgColor}">${chgTxt}</div>
      </div>
    </div>`;
  });
  document.getElementById("wvw-list").innerHTML=wvwHtml;

  // MONTH SUMMARY
  var mSumHtml=`
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;justify-content:space-between;padding:10px;background:#161616;border-radius:8px">
        <span style="font-size:12px;color:#555">Total Spent</span>
        <span style="font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#F0B429">${fmt(mT)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px;background:#161616;border-radius:8px">
        <span style="font-size:12px;color:#555">Transactions</span>
        <span style="font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff">${mExps.length}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px;background:#161616;border-radius:8px">
        <span style="font-size:12px;color:#555">Daily Average</span>
        <span style="font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#339AF0">${fmt(mT/Math.max(new Date().getDate(),1))}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px;background:#161616;border-radius:8px">
        <span style="font-size:12px;color:#555">Biggest Category</span>
        <span style="font-size:12px;font-weight:600;color:#CC5DE8">${sortedCats.length>0?sortedCats[0][0]:"—"}</span>
      </div>
    </div>`;
  document.getElementById("month-summary").innerHTML=mSumHtml;
}

loadData();
</script>
</body>
</html>
